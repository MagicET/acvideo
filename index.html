<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment for A&C</title>
    <style>
        body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; padding: 20px; }
        /* 非フルスクリーン時のコンテナ */
        #videoContainer { width:100%; max-width:900px; background:black; margin-bottom:12px; min-height:360px; }
        #videoContainer video { max-width:100%; max-height:100%; object-fit:contain; display:block; position: relative; top: 0; left: 0; }
        .controls { display:flex; gap:8px; align-items:center; flex-wrap:wrap }
        label { font-size:14px }
        input[type=number]{ width:80px }
        #status { margin-top:8px; font-size:14px }
        /* フルスクリーン時に画面いっぱいに表示する */
        #videoContainer:fullscreen { width:100%; height:100%; max-width:none; margin:0; padding:0; background:black; }
        #videoContainer:fullscreen video { max-width:100vw; max-height:100vh; top: 50vh; transform: translateY(-50%); }
    </style>
</head>
<body>
    <h2>Anxiety</h2>
    <div id="videoContainer"></div>

    <div class="controls">
        <label>最小長(%): <input id="minRange" type="number" value="10" min="1" step="1"></label>
        <label>最大長(%): <input id="maxRange" type="number" value="100" min="2" step="1"></label>
        <label>終了時間(s) (0または空欄で無限): <input id="fullDuration" type="number" value="0" min="1" step="30"></label>
        <label>順序: <select id="order"><option value="shuffle">シャッフル</option><option value="sequential">連続</option></select></label>
        <button id="loadBtn">ロード</button>
        <button id="startBtn">開始</button>
        <button id="stopBtn">停止</button>
        <button id="fsBtn">全画面</button>
    </div>

    <div id="status">ロードしてください</div>

    <script>
        // ファイル一覧 — 同じフォルダに置いてください
        const videoFiles = [
            'https://res.cloudinary.com/dgiovkmex/video/upload/so_5.9,eo_54.6/v1779193642/IMG_3049_X_avjoqm.mp4',
            'https://res.cloudinary.com/dgiovkmex/video/upload/so_6,eo_70/v1779193638/IMG_3047_X_moynet.mp4',
            'https://res.cloudinary.com/dgiovkmex/video/upload/so_5.6,eo_38.8/a_90/v1779193635/IMG_3046_X_grp0mm.mp4',
            'https://res.cloudinary.com/dgiovkmex/video/upload/a_90/v1779193635/IMG_3043_X_va9m4b.mp4',
            'https://res.cloudinary.com/dgiovkmex/video/upload/so_3.3,eo_50.7/v1779193631/IMG_3048_X_g75fzh.mp4',
            'https://res.cloudinary.com/dgiovkmex/video/upload/so_2,eo_54/a_90/v1779193629/IMG_3051_X_gpw8lh.mp4',
            'https://res.cloudinary.com/dgiovkmex/video/upload/v1779193627/IMG_3045_X_jzdsxx.mp4',
            /*'https://res.cloudinary.com/dgiovkmex/video/upload/v1779193625/IMG_3050_X_bwhmkw.mp4',*/
            'https://res.cloudinary.com/dgiovkmex/video/upload/c_crop,g_north,h_3460,w_1946/a_-90/v1779193621/IMG_3044_X_w2hafg.mp4',
            'https://res.cloudinary.com/dgiovkmex/video/upload/v1779193619/799829821.611463_X_skmxys.mp4',
            'https://res.cloudinary.com/dgiovkmex/video/upload/v1779193618/799829821.677341_X_jwvuxi.mp4',
            'https://res.cloudinary.com/dgiovkmex/video/upload/v1779193618/799829821.644678_X_l9xubs.mp4'    
        ];
        const sameAngles = [[1,4], [3,7], [9,10]];

        const container = document.getElementById('videoContainer');
        const minRangeInput = document.getElementById('minRange');
        const maxRangeInput = document.getElementById('maxRange');
        const loadBtn = document.getElementById('loadBtn');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const fsBtn = document.getElementById('fsBtn');
        const status = document.getElementById('status');
        const orderSel = document.getElementById('order');

        // プレロード用のvideo要素配列
        let index = 0;
        let running = false;
        let currentTimer = undefined;
        let previousEl = null;
        let currentEl = null;
        let nextEl = null;

        const maxHistoryCount = 5;
        let history = [];


        function randFloat(min, max) { return Math.random() * (max - min) + min; }
        function randInt(min, max) { return Math.floor(Math.random() * (max - min) + min); }

        const sameAngleMap = new Map();
        sameAngles.forEach(group => {
            group.forEach(i => {
                let set = sameAngleMap.get(i);
                if (!set) {
                set = new Set();
                sameAngleMap.set(i, set);
                }
                group.forEach(j => {
                if (i !== j) set.add(j);
                });
            });
        });
        function randVideoIndex(min, max) {
            while (true) {
                if (!history.includes(i = randInt(min, max)))
                    // 同じ画角のものが入ってるかどうかのチェック、ちと冗長
                    if (!history.some((h)=>(sameAngleMap.get(i)||new Set()).has(h)))
                        return i;
            }
        }

        function updateStatus(text){ status.textContent = text; }

        //function shuffleArray(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]] } }

        function waitForEvent(el, ev){ return new Promise(resolve => { const fn = () => { el.removeEventListener(ev, fn); resolve(); }; el.addEventListener(ev, fn); }); }

        // 全ファイルを事前に読み込む（hidden video 要素を作る）
        function loadElement(i){
            history.push(i);
            if (history.length >= maxHistoryCount + 1) history.shift();
            const v = document.createElement('video');
            v.src = videoFiles[i%videoFiles.length];
            v.preload = 'auto';
            v.playsInline = true;
            v.controls = false; // 非表示
            v.style.display = 'none';
            v.style.width = '100%';
            v.setAttribute('webkit-playsinline', '');
            container.appendChild(v);
            try { v.load(); } catch(e) { console.log(e) };
                v.addEventListener('canplaythrough', () => {
                    console.log(`${index} ロードされたファイル: ${v.src}`);
                })
                return v;
        }

        async function loadAndPlayCurrent(flag = "unknown"){
            if(!running) return;

            updateStatus(`再生準備: ${currentEl.src}`);
            console.log(`${index} 再生準備: ${currentEl.src}`);

            const dur = currentEl.duration || 0;

            const minSec = Math.max(0.1, dur * parseFloat(minRangeInput.value)/100 || 0.1);
            const maxSec = Math.max(minSec, dur * parseFloat(maxRangeInput.value)/100 || (minSec + 0.1));
            const segLen = randFloat(minSec, maxSec);

            const maxStart = Math.max(0, dur - segLen);
            const startTime = dur > segLen ? randFloat(0, maxStart) : 0;
            const lastingDuration = Math.min(segLen, Math.max(0.05, dur - startTime));
            

            console.log(`${index} 再生: ${currentEl.src} — 開始 ${startTime.toFixed(2)}s / 長さ ${(lastingDuration).toFixed(2)}s / 総時間 ${dur.toFixed(2)}`)

            try{ currentEl.currentTime = startTime; } catch(e){}
            await waitForEvent(currentEl, 'seeked');
            updateStatus(`再生: ${currentEl.src} — 開始 ${startTime.toFixed(2)}s / 長さ ${lastingDuration.toFixed(2)}s / 総時間 ${dur.toFixed(2)}`);

            try { await currentEl.play(); } catch(e) { console.log(e); }

            console.log("Successfully played");

            if(previousEl) try { previousEl.pause(); } catch(e) { console.log(e); };

            // 表示切替：現在の要素を隠し、新しい要素を表示
            currentEl.style.display = 'block';
            if(previousEl && previousEl !== currentEl){
                previousEl.remove();
            }

            if (currentTimer == undefined) {
                currentTimer = setTimeout(() => {
                    currentTimer = undefined;
                    nextSegment();
                }, lastingDuration*1000);
            } else {
                console.log("Timer was already defined")
            }
        }

        async function nextSegment(){
            if(!running) return;
            index += 1;
            previousEl = currentEl;
            currentEl = nextEl;
            if (orderSel.value === 'shuffle') nextEl = loadElement(randVideoIndex(0, videoFiles.length));
            else nextEl = loadElement(index + 1);
            console.log(`${index} nextSegment: ${index}`);
            try { nextEl.load(); } catch(e) { console.log(e) };
            await loadAndPlayCurrent("nextSegment");
        }

        function stop() {
            running = false;
            if(currentEl) try { currentEl.pause(); } catch(e) {}
        }

        // (timeupdate/ended イベントは各 preloaded 要素に登録済み)

        loadBtn.addEventListener('click', () => {
            index = 0;
            // 既に要素があれば消す
            container.innerHTML = '';
            history = [];
            previousEl = null;
            if (orderSel.value === 'shuffle') {
                currentEl = loadElement(randVideoIndex(0, videoFiles.length));
                nextEl = loadElement(randVideoIndex(0, videoFiles.length));
            } else {
                currentEl = loadElement(index);
                nextEl = loadElement(index + 1);
            }
            updateStatus('開始してください');
        });

        startBtn.addEventListener('click', async ()=>{
            clearTimeout(currentTimer);
            currentTimer = undefined;
            if(running) return;
            running = true;
            updateStatus('開始します...');
            await loadAndPlayCurrent("startBtn");
            if (fullDuration.value && fullDuration.value != 0) {
            setTimeout(() => {
                stop();
                updateStatus("終了しました");
                console.log("終了しました")
            }, fullDuration.value * 1000)
            }
            
        });

        stopBtn.addEventListener('click', ()=>{
            stop();
            updateStatus('停止しました');
        });

        // フルスクリーン切替
        fsBtn.addEventListener('click', async ()=>{
            try{
                if(!document.fullscreenElement){
                    await container.requestFullscreen();
                } else {
                    await document.exitFullscreen();
                }
            }catch(e){ console.warn('Fullscreen error', e); }
        });

        document.addEventListener('fullscreenchange', ()=>{
            if(document.fullscreenElement === container){
                fsBtn.textContent = '全画面解除';
            } else {
                fsBtn.textContent = '全画面';
            }
        });

        // 初期表示
        updateStatus('ロードしてください');
    </script>
</body>
</html>
