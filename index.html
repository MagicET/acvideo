<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procedural Cutter</title>
    <style>
        body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; padding: 20px; }
        /* 非フルスクリーン時のコンテナ */
        #videoContainer { width:100%; max-width:900px; background:magenta; margin-bottom:12px; min-height:360px; }
        #videoContainer video { max-width:100%; max-height:100%; object-fit:contain; display:block; position: relative; top: 0; left: 0; }
        .controls { display:flex; gap:8px; align-items:center; flex-wrap:wrap }
        label { font-size:14px }
        input[type=number]{ width:80px }
        #status { margin-top:8px; font-size:14px }
        /* フルスクリーン時に画面いっぱいに表示する */
        #videoContainer:fullscreen { width:100%; height:100%; max-width:none; margin:0; padding:0; background:white; }
        #videoContainer:fullscreen video { max-width:100vw; max-height:100vh; top: 50vh; transform: translateY(-50%); }
    </style>
</head>
<body>
    <h2>Procedural Cutter — ランダム区間で繋げる再生</h2>
    <div id="videoContainer"></div>

    <div class="controls">
        <label>最小長(s): <input id="minSec" type="number" value="2" min="0.1" step="0.1"></label>
        <label>最大長(s): <input id="maxSec" type="number" value="6" min="0.1" step="0.1"></label>
        <button id="loadBtn">ロード</button>
        <button id="startBtn">開始</button>
        <button id="stopBtn">停止</button>
        <button id="fsBtn">全画面</button>
        <label>順序: <select id="order"><option value="sequential">連続</option><option value="shuffle">シャッフル</option></select></label>
    </div>

    <div id="status">ロードしてください</div>

    <script>
        // ファイル一覧 — 同じフォルダに置いてください
        const videoFiles = [
            //'IMG_3043.MOV','IMG_3044.MOV','IMG_3045.MOV','IMG_3046.MOV','IMG_3047.MOV','IMG_3048.MOV','IMG_3049.MOV','IMG_3050.MOV','IMG_3051.MOV'
            'https://res.cloudinary.com/dgiovkmex/video/upload/v1779159700/IMG_3048_mpsm3p.mov','https://res.cloudinary.com/dgiovkmex/video/upload/v1779159693/IMG_3051_hcslsj.mov','https://res.cloudinary.com/dgiovkmex/video/upload/v1779159679/IMG_3047_ewwzdr.mov','https://res.cloudinary.com/dgiovkmex/video/upload/v1779159585/IMG_3044_a8fkpl.mov','https://res.cloudinary.com/dgiovkmex/video/upload/v1779159568/IMG_3043_spylmy.mov','https://res.cloudinary.com/dgiovkmex/video/upload/v1779159565/IMG_3045_jxr8sh.mov','https://res.cloudinary.com/dgiovkmex/video/upload/v1779159428/IMG_3050_gpy4mw.mov'
        ];

        const container = document.getElementById('videoContainer');
        const minSecInput = document.getElementById('minSec');
        const maxSecInput = document.getElementById('maxSec');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const fsBtn = document.getElementById('fsBtn');
        const status = document.getElementById('status');
        const orderSel = document.getElementById('order');

        // プレロード用のvideo要素配列
        let loadedFileCount = 0;
        let videoEls = [];
        let playlist = [...videoFiles];
        let index = 0;
        let running = false;
        let currentTimer = undefined;
        let currentEl = null;

        function rand(min, max){ return Math.random() * (max - min) + min; }

        function updateStatus(text){ status.textContent = text; }

        function shuffleArray(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]] } }

        function waitForEvent(el, ev){ return new Promise(resolve => { const fn = () => { el.removeEventListener(ev, fn); resolve(); }; el.addEventListener(ev, fn); }); }

        // 全ファイルを事前に読み込む（hidden video 要素を作る）
        function createPreloadedElements(){
            videoEls = playlist.map((src, i) => {
                const v = document.createElement('video');
                v.src = src;
                v.preload = 'auto';
                v.playsInline = true;
                v.controls = false; // 非表示
                v.style.display = 'none';
                v.style.width = '100%';
                v.setAttribute('webkit-playsinline', '');
                // イベントハンドラ（各要素ごと）
                /*v.addEventListener('timeupdate', ()=>{
                    if(!running || currentEl !== v) return;
                    if(v.currentTime >= targetTime - 0.05){
                        v.pause();
                        setTimeout(()=>{ nextSegment(); }, 50);
                    }
                });
                v.addEventListener('ended', ()=>{
                    if(!running) return;
                    setTimeout(()=>{ nextSegment(); }, 50);
                });*/
                container.appendChild(v);
                // 明示的にロードを呼ぶ
                try{ v.load(); }catch(e){console.log(e)}
                v.addEventListener('loadeddata', () => {
                    loadedFileCount += 1;
                    updateStatus("ロードされたファイル：" + loadedFileCount + "/" + videoFiles.length);
                })
                return v;
            });
        }

        async function loadAndPlayCurrent(flag = "unknown"){
            if(!running) return;
            const minSec = Math.max(0.1, parseFloat(minSecInput.value) || 1);
            const maxSec = Math.max(minSec, parseFloat(maxSecInput.value) || (minSec + 3));
            const segLen = rand(minSec, maxSec);

            const el = videoEls[index];
            updateStatus(`再生準備: ${playlist[index]}`);

            // metadata を待つ
            if (!isFinite(el.duration) || el.duration === 0){
                await waitForEvent(el, 'loadedmetadata');
            }

            const dur = el.duration || 0;
            const maxStart = Math.max(0, dur - segLen);
            const startTime = dur > segLen ? rand(0, maxStart) : 0;
            const lastingDuration = Math.min(segLen, Math.max(0.05, dur - startTime));

            
            console.log("before seek and play", Date.now());

            console.log(`再生: ${playlist[index]} — 開始 ${startTime.toFixed(2)}s / 長さ ${(lastingDuration).toFixed(2)}s`)

            try{ el.currentTime = startTime; } catch(e){}
            await waitForEvent(el, 'seeked');
            updateStatus(`再生: ${playlist[index]} — 開始 ${startTime.toFixed(2)}s / 長さ ${(lastingDuration).toFixed(2)}s`);

            console.log("after seek", Date.now());

            await el.play();

            // 表示切替：現在の要素を隠し、新しい要素を表示
            if(currentEl && currentEl !== el){
                currentEl.style.display = 'none';
            }
            el.style.display = 'block';
            currentEl = el;

            console.log("after play", Date.now());

            if (currentTimer == undefined) {
                currentTimer = setTimeout(() => {
                    currentTimer = undefined;
                    nextSegment();
                }, lastingDuration*1000);
            } else {
                console.log("Timer was already defined")
            }
        }

        async function nextSegment(){
            if(!running) return;
            // 次のインデックス
            index = (index + 1) % playlist.length;
            console.log("nextSegment: ", index);
            await loadAndPlayCurrent("nextSegment");
        }

        // (timeupdate/ended イベントは各 preloaded 要素に登録済み)

        loadBtn.addEventListener('click', async () => {
            // 順序設定
            playlist = [...videoFiles];
            if(orderSel.value === 'shuffle') shuffleArray(playlist);
            index = 0;
            // 既に要素があれば消す
            container.innerHTML = '';
            createPreloadedElements();
            updateStatus('ロードしています');
        });

        startBtn.addEventListener('click', async ()=>{
            if(running) return;
            running = true;
            updateStatus('開始します...');
            await loadAndPlayCurrent("startBtn");
        });

        stopBtn.addEventListener('click', ()=>{
            running = false;
            if(currentEl) try{ currentEl.pause(); }catch(e){}
            updateStatus('停止しました');
        });

        // フルスクリーン切替
        fsBtn.addEventListener('click', async ()=>{
            try{
                if(!document.fullscreenElement){
                    await container.requestFullscreen();
                } else {
                    await document.exitFullscreen();
                }
            }catch(e){ console.warn('Fullscreen error', e); }
        });

        document.addEventListener('fullscreenchange', ()=>{
            if(document.fullscreenElement === container){
                fsBtn.textContent = '全画面解除';
            } else {
                fsBtn.textContent = '全画面';
            }
        });

        // 初期表示
        updateStatus('ロードしてください');
    </script>
</body>
</html>
